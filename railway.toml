[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py ensure_admin"

[deploy]
startCommand = "gunicorn veta_connect.wsgi --workers 2 --preload --timeout 120 --log-file -"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
